<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fauzi Poetry Portfolio</title>
  <meta name="description" content="A calm editorial poetry portfolio website for Fauzi.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-section="home">
  <!--
    EDIT HERE
    Open script.js and edit the SITE_SETTINGS section at the very top.

    You can change:
    - Fauzi intro text
    - Contact details
    - Google Form feedback link
    - Book buying link
    - Home background image URL
    - Image URLs
    - Selected poem image URLs and explanations
  -->

  <header class="site-header" aria-label="Main navigation">
    <a class="brand" href="#home" aria-label="Go to home">Fauzi</a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
      <span class="sr-only">Open menu</span>
    </button>

    <nav class="site-nav" id="site-nav">
      <a href="#home">Home</a>
      <a href="#poems">Poems</a>
      <a href="#book">Book</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero" id="home">
      <!-- CHANGE IMAGE URL HERE -->
      <div class="hero-background" id="hero-background" aria-hidden="true"></div>

      <div class="hero-overlay"></div>

      <!-- CHANGE IMAGE URL HERE -->
      <img class="hero-person" id="hero-person" src="" alt="Cutout portrait of Fauzi">

      <div class="hero-content">
        <div class="hero-copy">
          <div class="kicker">Poetry Portfolio</div>
          <!-- CHANGE TEXT HERE -->
          <h1 id="intro-title"></h1>
          <!-- CHANGE TEXT HERE -->
          <p id="intro-text"></p>
          <div class="hero-actions">
            <a class="text-link" href="#poems">Read Poems</a>
            <a class="text-link" href="#book">View Book</a>
          </div>
        </div>
      </div>
    </section>

    <section class="poems-section" id="poems" aria-label="Poems">
      <div class="section-shell poems-intro">
        <p class="kicker">Selected Poems</p>
        <h2>Four pieces, and the quiet reasons behind them.</h2>
      </div>
      <div class="poems-list" id="poems-list" aria-live="polite"></div>
    </section>

    <section class="section-shell book-section" id="book">
      <div class="book-grid">
        <figure class="image-card book-cover-card">
          <!-- CHANGE IMAGE URL HERE -->
          <img id="book-cover-image" src="" alt="Placeholder book cover for Fauzi">
        </figure>

        <div class="book-copy">
          <p class="kicker">Book</p>
          <!-- CHANGE TEXT HERE -->
          <h2 id="book-title"></h2>
          <!-- CHANGE TEXT HERE -->
          <p id="book-description"></p>
          <!-- CHANGE BOOK BUY LINK HERE -->
          <a class="button" id="book-buy-button" href="#" target="_blank" rel="noopener">Buy the Book</a>
        </div>
      </div>
    </section>

    <section class="section-shell contact-section" id="contact">
      <div class="contact-grid">
        <div>
          <p class="kicker">Contact</p>
          <!-- CHANGE TEXT HERE -->
          <h2 id="contact-heading"></h2>
        </div>

        <address class="contact-card" id="contact-details">
          <!-- Contact details are added from script.js -->
        </address>
      </div>
    </section>
  </main>

  <!-- CHANGE GOOGLE FORM LINK HERE -->
  <a class="feedback-button" id="feedback-button" href="#" target="_blank" rel="noopener">Feedback</a>

  <dialog class="poem-dialog" id="poem-dialog" aria-label="Full poem reader">
    <button class="dialog-close" id="dialog-close" type="button">Close</button>
    <img id="dialog-image" src="" alt="">
  </dialog>

  <script src="script.js"></script>
</body>
</html>
